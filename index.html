<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Benjamin Le</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f1e;
      min-height: 100vh;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }

    @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(6px); }
    }

    @keyframes twinkle {
      from { opacity: 0.1; }
      to   { opacity: 0.9; }
    }
    
    .waves-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      /* height breathes via JS */
      height: 25vh;
      transition: height 0.05s linear;
    }
    
    svg.waves {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 100%;
    }

    /* all waves scroll at same speed so they stay in sync */
    .wave-1 { animation: scroll 8s linear infinite; }
    .wave-2 { animation: scroll 8s linear infinite reverse; opacity: 0.70; }
    .wave-3 { animation: scroll 6s linear infinite;          opacity: 0.45; }
    .wave-4 { animation: scroll 16s linear infinite reverse;  opacity: 0.25; }

    @keyframes scroll {
      from { transform: translateX(0);    }
      to   { transform: translateX(-50%); }
    }

    ::-webkit-scrollbar {
    width: 6px;
    }

    ::-webkit-scrollbar-track {
    background: transparent;
    }

    ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.075);
    border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>
  <div id="name-tag" style="
    position: fixed;
    top: 1.5rem;
    right: 2rem;
    font-family: 'Raleway', sans-serif;
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.5);
    opacity: 0;
    transition: opacity 2s ease;
    z-index: 20;
    pointer-events: none;
  ">BENJAMIN LE</div>
  <div id="hero-text" style="
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    pointer-events: none;
    z-index: 10;
  ">
    <div id="line1" style="
      font-family: 'Raleway', sans-serif;
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 200;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.15em;
      opacity: 1;
      transition: opacity 1s ease;
    "></div>
    <div id="line2" style="
      font-family: 'Raleway', sans-serif;
      font-size: clamp(1.4rem, 3.2vw, 2.2rem);
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.2em;
      opacity: 0;
      transition: opacity 1s ease;
      margin-top: 1rem;
    "></div>
    <div id="line3" style="
      font-family: 'Raleway', sans-serif;
      font-size: clamp(1.2rem, 2.8vw, 1.8rem);
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.2em;
      opacity: 0;
      transition: opacity 1s ease;
      margin-top: 1rem;
    "></div>
        <div id="arrow" style="
      font-size: 1.5rem;
      color: rgba(255,255,255,0.35);
      opacity: 0;
      transition: opacity 2s ease;
      margin-top: 0.75rem;
      animation: bounce 1.5s ease-in-out infinite;
    ">↓</div>
</div>
  <div class="waves-container" id="wavesContainer">
    <svg class="waves" viewBox="0 0 2880 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="wg1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0d3b6e"/>
          <stop offset="100%" stop-color="#061a38"/>
        </linearGradient>
        <linearGradient id="wg2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0e4d8a"/>
          <stop offset="100%" stop-color="#072040"/>
        </linearGradient>
        <linearGradient id="wg3" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a6aad"/>
          <stop offset="100%" stop-color="#0a3060"/>
        </linearGradient>
        <linearGradient id="wg4" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3a9bd5"/>
          <stop offset="100%" stop-color="#1054a0"/>
        </linearGradient>
      </defs>

      <!--
        Every path:
        - starts and ends at the same Y (e.g. wave-4 starts M0 150 and last C endpoint is 2880 180)
        - fits exactly within viewBox width 2880
        - each C cycle is an equal subdivision of 2880 so the pattern tiles perfectly
      -->

      <!-- Wave 4: Back — cycle: 720px -->
      <g class="wave-4">
        <path fill="url(#wg1)" d="
          M0 150
          C240 150 480 120 720 155
          C1020 215 1260 215 1500 180
          C1740 150 1980 130 2220 165
          C2460 215 2720 215 2880 180
          L2880 320 L0 320 
          Z"/>
      </g>

      <!-- Wave 3, 2880 px / 4 = 720 px each curve-->
      <g class="wave-3">
        <path fill="url(#wg2)" d="
          M0 170
          C240 170 480 140 720 175
          C1020 235 1260 235 1500 200
          C1740 170 1980 150 2220 185
          C2460 235 2720 235 2880 200
          L2880 320 L0 320 
          Z"/>
      </g>

      <!-- Wave 2 2880 px / 4 = 720 px each curve-->
      <g class="wave-2">
        <path fill="url(#wg3)" d="
          M0 190
          C240 190 480 160 720 195
          C1020 255 1260 255 1500 220
          C1740 190 1980 170 2220 205
          C2460 255 2720 255 2880 220
          L2880 320 L0 320 
          Z"/>
      </g>

      <!-- Wave 1: Front, 2880 px / 4 = 720 px each curve-->
      /<g class="wave-1">
        <path fill="url(#wg4)" d="
          M0 200
          C240 200 480 170 720 205
          C1020 265 1260 265 1500 230
          C1740 200 1980 180 2220 215
          C2460 265 2720 265 2880 230
          L2880 320 L0 320 
          Z"/>
      </g>
    </svg>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById('name-tag').style.opacity = '1';
    }, 150);
    /* ── stars ── */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 130; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        width:${size}px;
        height:${size}px;
        top:${(Math.random() * 75).toFixed(1)}%;
        left:${(Math.random() * 100).toFixed(1)}%;
        --d:${(Math.random() * 3 + 1.5).toFixed(1)}s;
        animation-delay:${(Math.random() * 4).toFixed(1)}s;
      `;
      starsEl.appendChild(s);
    }

    /* ── wave height breathing ──
       Uses a sine wave
       base   = resting height in vh
       range  = how many vh it rises and falls around base
       period = seconds for one full breath cycle
    */
    const container = document.getElementById('wavesContainer');
    const base   = 55;   // vh — resting height
    const range  = 5;   // vh — how much it rises/falls
    const period = 6;    // seconds per full cycle

    function breathe() {
      const t = performance.now() / 1000;
      // Math.sin goes -1 → +1 → -1 in one period, so height oscillates
      // smoothly between (base - range) and (base + range)
      const h = base + range * Math.sin((2 * Math.PI * t) / period);
      container.style.height = h.toFixed(2) + 'vh';
      requestAnimationFrame(breathe);
    }

    requestAnimationFrame(breathe);

    // typing animation
const line1 = document.getElementById('line1');
const line2 = document.getElementById('line2');
const arrow = document.getElementById('arrow');
const line3 = document.getElementById('line3');

function typeText(el, text, speed, callback) {
  let i = 0;
  const interval = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i === text.length) {
      clearInterval(interval);
      if (callback) callback();
    }
  }, speed);
}

typeText(line1, 'HELLO!', 100, () => {
  setTimeout(() => {
    line1.style.opacity = '0';
    setTimeout(() => {
      line2.style.opacity = '1';
      typeText(line2, 'WELCOME TO MY PERSONAL WEBSITE!', 60, () => {
        setTimeout(() => {
          line2.style.opacity = '0';
          setTimeout(() => {
            line3.style.opacity = '1';
            arrow.style.opacity = '1';
            typeText(line3, 'SCROLL DOWN TO DIVE IN', 60);
          }, 1000);
        }, 1200);
      });
    }, 1000);
  }, 1200);
});
  </script>
  <div style="height: 400vh;"></div>
</body>
</html>
