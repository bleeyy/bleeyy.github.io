<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f1e;
      height: 100vh;
      overflow: hidden;
    }

    /* stars */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.1; }
      to   { opacity: 0.9; }
    }

    /* waves */
    .waves-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55vh;
      overflow: hidden;
    }

    svg.waves {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 100%;
    }

    .wave-1 { animation: wave 5s linear infinite; }
    .wave-2 { animation: wave 5s linear infinite reverse; opacity: 0.7; }
    .wave-3 { animation: wave 5s linear infinite; opacity: 0.45; }
    .wave-4 { animation: wave 5s linear infinite reverse; opacity: 0.25; }

    @keyframes wave {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="waves-container">
    <svg class="waves" viewBox="0 0 2880 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="wg1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0d3b6e"/>
          <stop offset="100%" stop-color="#061a38"/>
        </linearGradient>
        <linearGradient id="wg2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0e4d8a"/>
          <stop offset="100%" stop-color="#072040"/>
        </linearGradient>
        <linearGradient id="wg3" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a6aad"/>
          <stop offset="100%" stop-color="#0a3060"/>
        </linearGradient>
        <linearGradient id="wg4" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3a9bd5"/>
          <stop offset="100%" stop-color="#1054a0"/>
        </linearGradient>
      </defs>

      <!-- wave 4 back -->
      <g class="wave-4">
        <path fill="url(#wg1)" d="M0 200 C240 150 480 250 720 200 C960 150 1200 250 1440 200 C1680 150 1920 250 2160 200 C2400 150 2640 250 2880 200 L2880 320 L0 320 Z"/>
      </g>

      <!-- wave 3 -->
      <g class="wave-3">
        <path fill="url(#wg2)" d="M0 220 C360 160 720 280 1080 220 C1440 160 1800 280 2160 220 C2520 160 2880 280 3240 220 L3240 320 L0 320 Z"/>
      </g>

      <!-- wave 2 -->
      <g class="wave-2">
        <path fill="url(#wg3)" d="M0 240 C300 190 600 290 900 240 C1200 190 1500 290 1800 240 C2100 190 2400 290 2700 240 C3000 190 3300 290 3600 240 L3600 320 L0 320 Z"/>
      </g>

      <!-- wave 1 front -->
      <g class="wave-1">
        <path fill="url(#wg4)" d="M0 265 C180 235 360 295 540 265 C720 235 900 295 1080 265 C1260 235 1440 295 1620 265 C1800 235 1980 295 2160 265 C2340 235 2520 295 2700 265 C2880 235 3060 295 3240 265 L3240 320 L0 320 Z"/>
      </g>
    </svg>
  </div>

  <script>
    const container = document.getElementById('stars');
    for (let i = 0; i < 130; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        width:${size}px;
        height:${size}px;
        top:${(Math.random() * 60).toFixed(1)}%;
        left:${(Math.random() * 100).toFixed(1)}%;
        --d:${(Math.random() * 3 + 1.5).toFixed(1)}s;
        animation-delay:${(Math.random() * 4).toFixed(1)}s;
      `;
      container.appendChild(s);
    }
  </script>
</body>
</html>
